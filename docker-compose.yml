

services:
  postgres:
    image: postgres:15-alpine
    container_name: db_clientes
    environment:
      # la BD nace con las variables del env local
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Configuracion para la aplicacion Next.js
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_clientes
    ports:
      - "3000:3000"
    environment:
      # Inyectamos las variables
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  # Túnel Cloudflare para exponer la aplicación de forma segura
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tunnel_clientes
    command: tunnel --url http://app_clientes:3000
    depends_on:
      - web
    networks:
      - app-network

volumes:
  pgdata:

networks:
  app-network:
    driver: bridge